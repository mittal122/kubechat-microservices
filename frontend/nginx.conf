server {
    listen 80;
    server_name _;

    # Serve the React build
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ──
    # Reduces payload size by ~60-70% for text-based assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;

    # ── Static Asset Caching ──
    # Vite hashes filenames, so 1-year cache is safe (content-addressable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA Fallback ──
    # Always serve index.html for client-side routes (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy API requests to the backend service ──
    # In Kubernetes: proxies to backend-service ClusterIP
    # In Docker Compose: proxies to the "backend" container
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Reverse-proxy Socket.IO (WebSocket upgrade support) ──
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # Keep WebSocket connections alive for 1 hour
        proxy_send_timeout 3600s;
    }
}
