version: "3.9"

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: kubechat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # ── Backend (Node.js + Express) ──
  backend:
    build: ./backend
    container_name: kubechat-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/kubechatMicroservices
      - JWT_SECRET=your_jwt_secret_key_change_this_in_production
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Frontend (Vite build → nginx) ──
  frontend:
    build: ./frontend
    container_name: kubechat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
