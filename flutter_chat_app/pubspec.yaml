name: flutter_chat_app
description: "KubeChat — A secure, privacy-first real-time chat application."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management (≈ React Context)
  provider: ^6.1.2

  # HTTP Client (≈ Axios)
  dio: ^5.4.0

  # Socket.IO Client
  socket_io_client: ^2.0.3+1

  # Local storage for JWT tokens (≈ localStorage)
  shared_preferences: ^2.2.2

  # Typography
  google_fonts: ^6.1.0

  # Date/time formatting
  intl: ^0.19.0

  # QR Code generation (privacy-first discovery)
  qr_flutter: ^4.1.0

  # QR Code scanning (camera-based)
  mobile_scanner: ^5.1.1

  # System share sheet
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
