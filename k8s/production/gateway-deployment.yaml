# ─────────────────────────────────────────
# API Gateway Deployment — Reverse Proxy
# ─────────────────────────────────────────
# The single entry point for all client traffic.
# Routes to auth/user/chat services via K8s DNS.
# No direct DB access — only proxies requests.
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: api-gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: chattining
        app.kubernetes.io/component: api-gateway
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: api-gateway
          image: mittal122/chattining-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
            - name: CORS_ORIGIN
              value: "*"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: USER_SERVICE_URL
              value: "http://user-service:5002"
            - name: CHAT_SERVICE_URL
              value: "http://chat-service:5003"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
