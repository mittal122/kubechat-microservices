# ─────────────────────────────────────────
# Auth Service Deployment + HPA
# ─────────────────────────────────────────
# Handles: registration, login, JWT, refresh, logout
# Dependencies: MongoDB (via MONGO_URI secret)
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: auth-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: chattining
        app.kubernetes.io/component: auth-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: mittal122/chattining-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              protocol: TCP
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "production"
          envFrom:
            - secretRef:
                name: chattining-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 5001
            failureThreshold: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
---
# ── Auth Service HPA ──
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-hpa
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: auth-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
