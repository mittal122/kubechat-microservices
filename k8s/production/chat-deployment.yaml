# ─────────────────────────────────────────
# Chat Service Deployment + HPA
# ─────────────────────────────────────────
# Handles: messages, conversations, Socket.IO WebSockets
# Dependencies: MongoDB + Redis (Socket.IO adapter)
# Higher resources: holds persistent WebSocket connections
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: chat-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
        app.kubernetes.io/name: chattining
        app.kubernetes.io/component: chat-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: chat-service
          image: mittal122/chattining-chat:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
              protocol: TCP
          env:
            - name: PORT
              value: "5003"
            - name: NODE_ENV
              value: "production"
            - name: CORS_ORIGIN
              value: "*"
            # Redis URL for Socket.IO multi-pod adapter
            - name: REDIS_URL
              value: "redis://redis:6379"
          envFrom:
            - secretRef:
                name: chattining-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 5003
            failureThreshold: 10
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: chat-service
spec:
  selector:
    app: chat-service
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
---
# ── Chat Service HPA ──
# Higher max replicas — most likely to spike under load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-hpa
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: chat-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
