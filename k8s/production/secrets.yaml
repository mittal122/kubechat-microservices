# ─────────────────────────────────────────
# Secrets: shared across auth, user, chat services
# ─────────────────────────────────────────
# WARNING: This is a TEMPLATE. Never commit real secrets to Git.
#
# Production setup options:
#   1. kubectl create secret generic chattining-secrets \
#        --from-literal=JWT_SECRET=your_real_secret \
#        --from-literal=MONGO_URI=mongodb+srv://user:pass@cluster.mongodb.net/chatApp \
#        -n chattining
#
#   2. AWS Secrets Manager + External Secrets Operator (recommended)
#
#   3. Sealed Secrets (kubeseal) for GitOps workflows
# ─────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: chattining-secrets
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_REAL_SECRET"
  MONGO_URI: "REPLACE_WITH_REAL_MONGO_CONNECTION_STRING"
