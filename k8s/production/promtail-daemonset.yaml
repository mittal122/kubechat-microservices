# ─────────────────────────────────────────
# Promtail — Log Collection Agent (DaemonSet)
# ─────────────────────────────────────────
# Runs on EVERY node in the cluster.
# Collects stdout/stderr from all containers.
# Ships logs to Loki with Kubernetes labels.
# ─────────────────────────────────────────

# ── Promtail Config ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # Collect logs from all pods in the chattining namespace
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - chattining
        relabel_configs:
          # Keep only pods in our namespace
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # Use pod name as label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Use container name as label
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Use app label from pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
        pipeline_stages:
          # Try to parse JSON logs (our services log JSON)
          - json:
              expressions:
                level: level
                msg: message
          - labels:
              level:
---
# ── Promtail DaemonSet ──
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
        app.kubernetes.io/name: chattining
        app.kubernetes.io/component: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.6
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
---
# ── Service Account ──
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: chattining
  labels:
    app.kubernetes.io/name: chattining
    app.kubernetes.io/component: promtail
---
# ── RBAC — Promtail needs to discover pods ──
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: chattining
