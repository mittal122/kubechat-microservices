apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: mittal122/kubechat-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:5001"
        - name: USER_SERVICE_URL
          value: "http://user-service:5002"
        - name: CHAT_SERVICE_URL
          value: "http://chat-service:5003"
---
# LoadBalancer exposes port 5000 to the internet
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
