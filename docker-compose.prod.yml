# ─────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Production-Grade Local Simulation
# ─────────────────────────────────────────────────────────────
# Usage:
#   docker-compose -f docker-compose.prod.yml up --build
#
# This mirrors the cloud production environment locally:
#   - Redis for Socket.IO multi-pod broadcasting
#   - MongoDB with authentication enabled
#   - Health checks on all services
#   - Resource limits matching K8s quotas
#   - Environment variables via .env file
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Redis (Socket.IO Adapter for horizontal scaling) ──
  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: chatadmin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_in_production}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Backend (Node.js + Express + Socket.IO) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://chatadmin:${MONGO_PASSWORD:-changeme_in_production}@mongo:27017/chatApp?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_change_this_in_production}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped

  # ── Frontend (Vite build → nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

volumes:
  mongo-data:
