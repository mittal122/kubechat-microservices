# docker-compose.prod.yml
# Production deployment — uses external MongoDB Atlas + Upstash Redis
# NO local MongoDB or Redis containers needed (saves ~400MB RAM on free VM)

services:
  # ── Auth Service ────────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: kubechat-auth
    restart: unless-stopped
    environment:
      - PORT=5001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    expose:
      - "5001"
    networks:
      - kubechat-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ── User Service ────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: kubechat-user
    restart: unless-stopped
    environment:
      - PORT=5002
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    expose:
      - "5002"
    networks:
      - kubechat-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ── Chat Service ────────────────────────────────────────────────
  chat-service:
    build: ./services/chat-service
    container_name: kubechat-chat
    restart: unless-stopped
    environment:
      - PORT=5003
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    ports:
      - "5003:5003"       # Exposed directly for Socket.IO WebSocket connections
    networks:
      - kubechat-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5003/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ── API Gateway (Public Entry Point) ───────────────────────────
  api-gateway:
    build: ./services/api-gateway
    container_name: kubechat-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"       # Only this port is exposed to the internet
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - USER_SERVICE_URL=http://user-service:5002
      - CHAT_SERVICE_URL=http://chat-service:5003
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      - auth-service
      - user-service
      - chat-service
    networks:
      - kubechat-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  kubechat-net:
    driver: bridge
