# docker-compose.monitoring.yml
# Monitoring stack: Loki + Promtail + Grafana
# Runs separately from the Kubernetes app stack.
# Promtail reads logs directly from K3s pod log files on the host.

services:
  # ── Loki (Log Storage) ───────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: kubechat-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-net

  # ── Promtail (K3s Log Collector) ─────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: kubechat-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      # Read K3s pod logs directly from the host filesystem
      - /var/log/pods:/var/log/pods:ro
      - /var/lib/rancher/k3s/agent/containerd:/var/lib/rancher/k3s/agent/containerd:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring-net

  # ── Grafana (Dashboard UI) ───────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: kubechat-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=kubechat123
      - GF_USERS_ALLOW_SIGN_UP=false
      # Auto-provision Loki as a datasource
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
